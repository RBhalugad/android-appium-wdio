name: Android BrowserStack Tests

on:
    pull_request:
        branches: [main]
    workflow_dispatch: # Allow manual trigger

jobs:
    android-browserstack-test:
        name: Run Android Appium Tests on BrowserStack
        runs-on: ubuntu-latest
        timeout-minutes: 30

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Run Android BrowserStack tests
              run: npm run test:android:browserstack
              env:
                  BROWSERSTACK_USERNAME: ${{ secrets.BROWSERSTACK_USERNAME }}
                  BROWSERSTACK_ACCESS_KEY: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}
                  BROWSERSTACK_APP_URL: ${{ secrets.BROWSERSTACK_APP_URL }}

            - name: Generate Allure report
              if: always()
              run: npx allure generate allure-results --clean -o allure-report

            - name: Upload Allure report
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: android-allure-report
                  path: allure-report/
                  retention-days: 1

            - name: Upload test logs
              if: failure()
              uses: actions/upload-artifact@v4
              with:
                  name: android-test-logs
                  path: |
                      log/
                      logs/
                  retention-days: 1
