name: Android BrowserStack Tests

on:
    pull_request:
        branches: [main]
    workflow_dispatch: # Allow manual trigger

jobs:
    lint:
        name: Code Quality / Lint
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 24
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Check Formatting
              run: npm run format:check

            - name: Type check
              run: npm run typecheck

    test:
        name: Run Android Appium Tests
        needs: lint
        runs-on: ubuntu-latest
        timeout-minutes: 30
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 24
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Run Android BrowserStack tests
              run: npm run test:android:browserstack
              env:
                  BROWSERSTACK_USERNAME: ${{ secrets.BROWSERSTACK_USERNAME }}
                  BROWSERSTACK_ACCESS_KEY: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}
                  BROWSERSTACK_ANDROID_APP_URL: ${{ secrets.BROWSERSTACK_ANDROID_APP_URL }}

            - name: Upload Allure results
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: android-allure-results
                  path: allure-results/
                  retention-days: 1

            - name: Upload test logs
              if: failure()
              uses: actions/upload-artifact@v4
              with:
                  name: android-test-logs
                  path: |
                      log/
                      logs/
                  retention-days: 1

    report:
        name: Generate Allure Report
        needs: test
        if: always()
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 24

            - name: Install allure commandline
              run: npm install -g allure-commandline

            - name: Download Allure results
              uses: actions/download-artifact@v4
              with:
                  name: android-allure-results
                  path: allure-results

            - name: Generate Allure report
              run: allure generate allure-results --clean -o allure-report

            - name: Upload Allure report
              uses: actions/upload-artifact@v4
              with:
                  name: android-allure-report
                  path: allure-report/
                  retention-days: 1
